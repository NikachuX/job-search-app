<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="src/assets/icon.png">
  <title>Job Finder</title>
</head>

<body>
  <header class="header">
    <div class="container header__container">
      <a href="/">
      <div class="header__logo">
        <!-- Inline SVG иконка брифкейса -->
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M20 7H4C2.89543 7 2 7.89543 2 9V17C2 18.1046 2.89543 19 4 19H20C21.1046 19 22 18.1046 22 17V9C22 7.89543 21.1046 7 20 7Z"
            stroke="currentColor" stroke-width="2" />
          <path d="M16 7V5C16 3.89543 15.1046 3 14 3H10C8.89543 3 8 3.89543 8 5V7" stroke="currentColor"
            stroke-width="2" />
        </svg>
        JobFinder
      </div>
      </a>

      <nav class="header__nav" id="header-nav">
        <a href="/#vacancies" class="header__link">Вакансии</a>
        <a href="/#companies" class="header__link">Компании</a>
        <a href="/#tips" class="header__link">Советы</a>
        <a href="#" class="header__link">О сервисе</a>
      </nav>

      <div class="header__actions" id="header-actions">
        <!-- Для неавторизованного пользователя -->
        <button class="header__login" id="login-btn">Вход</button>
        <button class="header__register" id="register-btn">Регистрация</button>

        <!-- Для авторизованного пользователя (скрыто по умолчанию) -->
        <div id="user-panel" style="display: none; align-items: center; gap: 12px;">
          <span id="username-display" style="font-weight: 500; color: var(--color-primary);"></span>
          <button id="logout-btn"
            style="background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer;">
            Выход
          </button>
        </div>
      </div>

      <div class="header__burger" id="burger">
        <span></span>
        <span></span>
        <span></span>
      </div>
  </header>

  <main>
    <h1>ABOUT</h1>

   </main>
   <script type="module" src="/src/js/main.js"></script>
</body>

</html>
